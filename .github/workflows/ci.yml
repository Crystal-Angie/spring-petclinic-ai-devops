name: CI — Build and Push

# Triggers:
#   push to main  → run tests, then build and push all 8 Docker images to ECR
#   pull request  → run tests only (no Docker build, no ECR push)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Test
  # Compiles and tests all modules. Runs on every push and every PR.
  # A failing test blocks all downstream jobs.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven   # caches ~/.m2 between runs — avoids re-downloading dependencies

      - name: Run tests
        run: |
          # The parent pom.xml declares modules without the 'app/' prefix,
          # so Maven must be invoked from a directory where the module dirs
          # are direct siblings of the pom. Copying pom.xml into app/ achieves this.
          cp pom.xml app/
          mvn -f app/pom.xml test --no-transfer-progress

  # ---------------------------------------------------------------------------
  # Job 2: Build and push Docker images
  # Runs only when a commit lands on main (not on PRs).
  # Each of the 8 services builds in parallel via a matrix strategy.
  #
  # Prerequisites — add this secret in GitHub → Settings → Secrets:
  #   AWS_ROLE_ARN   ARN of the IAM role GitHub Actions assumes via OIDC
  #
  # OIDC federation: GitHub issues a short-lived JWT token proving which repo
  # and branch triggered this workflow. AWS validates the token and issues
  # temporary credentials — no long-lived access keys stored anywhere.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # Required for OIDC token request — GitHub issues a JWT that AWS validates
    # instead of using long-lived access keys stored in secrets.
    permissions:
      id-token: write
      contents: read

    strategy:
      # fail-fast: false means if one service fails to build, the others continue.
      # You see all failures at once rather than stopping at the first.
      fail-fast: false
      matrix:
        include:
          - service: spring-petclinic-api-gateway
            ecr_repo: petclinic/api-gateway
          - service: spring-petclinic-customers-service
            ecr_repo: petclinic/customers-service
          - service: spring-petclinic-vets-service
            ecr_repo: petclinic/vets-service
          - service: spring-petclinic-visits-service
            ecr_repo: petclinic/visits-service
          - service: spring-petclinic-config-server
            ecr_repo: petclinic/config-server
          - service: spring-petclinic-discovery-server
            ecr_repo: petclinic/discovery-server
          - service: spring-petclinic-admin-server
            ecr_repo: petclinic/admin-server
          - service: spring-petclinic-genai-service
            ecr_repo: petclinic/genai-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        # Outputs: registry = {account_id}.dkr.ecr.{region}.amazonaws.com

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f docker/Dockerfile \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            -t $REGISTRY/${{ matrix.ecr_repo }}:$IMAGE_TAG \
            -t $REGISTRY/${{ matrix.ecr_repo }}:latest \
            .

          # Push both tags: the SHA tag is immutable (used in Helm for rollbacks),
          # latest always points to the most recent successful main build.
          docker push $REGISTRY/${{ matrix.ecr_repo }}:$IMAGE_TAG
          docker push $REGISTRY/${{ matrix.ecr_repo }}:latest

  # ---------------------------------------------------------------------------
  # Job 3: Update image tags in Helm values files
  # Runs after ALL 8 build-and-push matrix jobs complete successfully.
  # Updates image.tag in each values file to the new git SHA, then commits
  # back to main. ArgoCD detects the change and auto-deploys the new version.
  # [skip ci] in the commit message prevents this push from triggering CI again.
  # ---------------------------------------------------------------------------
  update-image-tags:
    name: Update image tags in Helm values
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update image tags
        run: |
          for service in api-gateway customers-service vets-service visits-service \
                         config-server discovery-server admin-server genai-service; do
            yq -i ".image.tag = \"${{ github.sha }}\"" \
              kubernetes/helm-charts/petclinic-service/values/${service}.yaml
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/helm-charts/petclinic-service/values/
          git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]"
          git push
