replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

containerPort: 8080
probePort: ~

env: []

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Paths only — port is always .Values.containerPort in the template
probeType: http

readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 6
  timeoutSeconds: 5

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 60
  periodSeconds: 15
  failureThreshold: 3
  timeoutSeconds: 5

ingress:
  enabled: false
  annotations: {}
  host: ""

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false

namespace: petclinic

serviceMonitor:
  enabled: true
  path: /actuator/prometheus
  interval: 30s
