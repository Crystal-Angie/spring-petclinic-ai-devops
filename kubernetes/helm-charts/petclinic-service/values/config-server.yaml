image:
  repository: 703671902584.dkr.ecr.us-east-1.amazonaws.com/petclinic/config-server

containerPort: 8888
service:
  port: 8888

# Config server intercepts all HTTP paths for config requests, which conflicts
# with Spring Boot Actuator health paths. Use TCP probes to avoid the conflict.
probeType: tcp
probePort: 8888

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    memory: 512Mi

# Longer delays — other services wait on this one at startup
readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 50
  periodSeconds: 10
  failureThreshold: 6
  timeoutSeconds: 5

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 90
  periodSeconds: 15
  failureThreshold: 3
  timeoutSeconds: 5

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "kubernetes"
