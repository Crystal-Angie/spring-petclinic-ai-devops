image:
  repository: 703671902584.dkr.ecr.us-east-1.amazonaws.com/petclinic/api-gateway
  tag: 2fe9d5b7e6340ac177a7459f0d12d3beaf6f9f0d
containerPort: 8080
# ClusterIP — the Ingress (ALB) handles all external traffic
service:
  type: ClusterIP
  port: 8080
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
  # host: app.yourdomain.com  # uncomment and set in Phase 7 when domain is ready
  host: ""
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "kubernetes"
  - name: CONFIG_SERVER_URL
    value: "http://config-server:8888"
