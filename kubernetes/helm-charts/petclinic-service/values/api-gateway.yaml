image:
  repository: YOUR_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/petclinic/api-gateway

containerPort: 8080

# LoadBalancer exposes this service externally — it is the only public entry point
service:
  type: LoadBalancer
  port: 80

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "kubernetes"
  - name: CONFIG_SERVER_URL
    value: "http://config-server:8888"
