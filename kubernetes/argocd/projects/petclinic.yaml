apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: petclinic
  namespace: argocd
spec:
  description: Spring PetClinic microservices
  sourceRepos:
    - https://github.com/Crystal-Angie/spring-petclinic-ai-devops
    - https://prometheus-community.github.io/helm-charts
  destinations:
    - namespace: petclinic
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
  # Allow all namespace-scoped resources — required for the monitoring stack
  # (kube-prometheus-stack deploys Secrets, DaemonSets, Jobs, RBAC, Webhooks, CRDs, etc.)
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  # Allow cluster-scoped resources: Namespaces, CRDs, ClusterRoles, ClusterRoleBindings, Webhooks
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
